# 2차 백엔드 런타임 설정 (2단계: H2 in-memory)
spring:
  datasource:
    # 인메모리 H2, MySQL 호환 모드 (재기동 시 휘발 — require 7.2)
    url: jdbc:h2:mem:carwash;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # 스키마/시드 직접 관리 (MyBatis는 ORM 자동 DDL이 없음 — require_v1.md v1.5)
  # 기동 시 schema.sql(DDL) → data.sql(시드) 순으로 자동 실행
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false
  h2:
    console:
      # http://localhost:8080/h2-console 로 확인
      enabled: true
  # 알림 SMTP (Phase 9) — 개발 기본은 외부 의존 없는 로컬 메일 캐처(MailHog/Mailpit, localhost:1025).
  #   운영 자격증명은 환경변수로 주입(하드코딩 금지). host 미지정 시에도 기본값으로 기동 실패 회피.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}              # 로컬 캐처는 인증 없음
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}      # 운영 SMTP에서만 true

# MyBatis 설정 (JPA/Hibernate 미사용 — require_v1.md v1.5)
mybatis:
  mapper-locations: classpath:mapper/*.xml      # 매퍼 XML 위치 (Phase 1부터 추가)
  type-aliases-package: com.carwash.domain      # 도메인 POJO 별칭 패키지
  configuration:
    map-underscore-to-camel-case: true          # snake_case 컬럼 ↔ camelCase 프로퍼티

server:
  port: 8080

# 로깅 레벨 설정 — 루트는 INFO 기본, 앱 코드/SQL만 자세히
logging:
  level:
    root: INFO                  # 전체 기본값 (Spring 내부·라이브러리)
    com.carwash: DEBUG          # 앱 코드
    com.carwash.mapper: TRACE   # MyBatis SQL/파라미터 (매퍼 인터페이스 패키지)

# JWT 인증 설정 (Phase 3) — HS256 대칭키(32byte 이상), 만료
jwt:
  secret: carwash-dev-secret-key-please-change-in-production-0123456789
  expiration-ms: 86400000   # 24시간

# 회원가입 이메일 인증 설정
app:
  signup:
    # 개발/테스트에서만 인증 코드 조회(GET /api/auth/signup/dev-code) 허용 — 운영(application-prod)에선 false.
    #   실제 운영은 코드를 메일로만 전달하며 이 백도어를 노출하지 않는다.
    dev-code-peek: ${SIGNUP_DEV_CODE_PEEK:true}
